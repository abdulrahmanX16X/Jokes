<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voro Jokes | Premium Dark</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NE8QH6RTWG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-NE8QH6RTWG');
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [view, setView] = useState('show');

      return (
        <div className="max-w-xl mx-auto p-4 py-8">
          <header className="mb-10 text-center">
            <h1 className="text-5xl font-extrabold tracking-tight text-white mb-2 italic">
              VORO<span className="text-blue-500">Jokes</span>
            </h1>
            <p className="text-slate-500 font-medium">Laughter served in Dark Mode.</p>
          </header>

          <nav className="flex gap-2 p-1.5 glass rounded-2xl mb-8 border border-slate-800 shadow-2xl">
            <button 
              onClick={() => setView('show')} 
              className={`flex-1 py-3 rounded-xl font-bold transition-all duration-300 ${view === 'show' ? 'bg-blue-600 text-white shadow-[0_0_20px_rgba(37,99,235,0.4)]' : 'text-slate-400 hover:bg-slate-800'}`}>
              Browse Feed
            </button>
            <button 
              onClick={() => setView('add')} 
              className={`flex-1 py-3 rounded-xl font-bold transition-all duration-300 ${view === 'add' ? 'bg-blue-600 text-white shadow-[0_0_20px_rgba(37,99,235,0.4)]' : 'text-slate-400 hover:bg-slate-800'}`}>
              Post Joke
            </button>
          </nav>

          <main className="animate-in fade-in duration-500">
            {view === 'show' ? <ShowJokes /> : <AddJoke />}
          </main>
        </div>
      );
    };

    const ShowJokes = () => {
      const [jokes, setJokes] = useState([]);
      const [type, setType] = useState("any");
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const categories = ["any", "social", "school", "movie", "sport"];

      const fetchJokes = async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await axios.get(`https://joke1.onrender.com/jokes?type=${type}`);
          if (res.data.Success) {
            setJokes(res.data.jokes || []);
          } else {
            throw new Error("Failed to fetch jokes.");
          }
        } catch (err) {
          setError("Check your connection and try again.");
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchJokes(); }, [type]);

      return (
        <div className="space-y-6">
          {/* Category Circles */}
          <div className="flex flex-wrap justify-center gap-3 mb-6">
            {categories.map((cat) => (
              <button
                key={cat}
                onClick={() => setType(cat)}
                className={`px-5 py-2 rounded-full text-sm font-semibold capitalize border transition-all duration-300 ${
                  type === cat 
                  ? 'bg-blue-600 border-blue-500 text-white shadow-lg scale-110' 
                  : 'bg-slate-900 border-slate-800 text-slate-400 hover:border-slate-600'
                }`}
              >
                {cat}
              </button>
            ))}
          </div>
          
          {loading ? (
            <div className="flex justify-center py-20">
              <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
          ) : error ? (
            <div className="bg-red-500/10 border border-red-500/50 p-6 rounded-2xl text-center">
              <p className="text-red-400 font-bold mb-4">Oops! {error}</p>
              <button onClick={fetchJokes} className="bg-red-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-red-600 transition">
                Retry
              </button>
            </div>
          ) : jokes.length > 0 ? (
            jokes.map((j, i) => (
              <div key={i} className="bg-slate-900/50 p-6 rounded-3xl border border-slate-800 hover:border-blue-500/50 transition-all duration-500 group">
                <div className="flex justify-between items-start mb-4">
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-bold text-blue-400">@{j.Name}</span>
                    {j.Name.toLowerCase() === 'dev' && (
                      <span className="bg-amber-500/20 text-amber-500 text-[10px] px-2 py-0.5 rounded-full border border-amber-500/30 flex items-center gap-1 shadow-[0_0_10px_rgba(245,158,11,0.2)]">
                        👑 <span className="font-bold">DEV</span>
                      </span>
                    )}
                  </div>
                  <span className="text-[10px] font-black uppercase tracking-widest bg-slate-800 px-3 py-1 rounded-full text-slate-500 group-hover:text-blue-400 transition-colors">
                    {j.Type}
                  </span>
                </div>
                <p className="text-lg leading-relaxed text-slate-100 italic">"{j.Body}"</p>
              </div>
            ))
          ) : (
            <div className="text-center py-20 text-slate-600 font-medium">Nothing funny here yet... 😴</div>
          )}
        </div>
      );
    };

    const AddJoke = () => {
      const [form, setForm] = useState({ name: '', body: '', type: 'social' });
      const [status, setStatus] = useState({ type: '', msg: '' });
      const categories = ["social", "school", "movie", "sport"];

      const submit = async () => {
        if (!form.name || !form.body) {
          setStatus({ type: 'error', msg: 'Fields cannot be empty! ⚠️' });
          return;
        }
        try {
          const res = await axios.post("https://joke1.onrender.com/create", form);
          if (res.data.Success) {
            setStatus({ type: 'success', msg: 'Joke live! 🚀' });
            setForm({ name: '', body: '', type: 'social' });
          }
        } catch { 
          setStatus({ type: 'error', msg: 'Submission failed ❌' }); 
        }
      };

      return (
        <div className="bg-slate-900/40 p-8 rounded-3xl border border-slate-800 shadow-2xl space-y-6">
          <div className="space-y-4">
            <input 
              className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" 
              placeholder="Your Alias (e.g. Joker123)" 
              value={form.name} 
              onChange={e => setForm({...form, name: e.target.value})} 
            />
            <textarea 
              className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition h-40 resize-none" 
              placeholder="Tell your story..." 
              value={form.body} 
              onChange={e => setForm({...form, body: e.target.value})} 
            />
          </div>

          <div className="space-y-3">
            <label className="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Select Genre</label>
            <div className="flex flex-wrap gap-2">
              {categories.map(c => (
                <button
                  key={c}
                  onClick={() => setForm({...form, type: c})}
                  className={`flex-1 py-2 px-4 rounded-xl text-xs font-bold capitalize transition-all ${form.type === c ? 'bg-slate-200 text-slate-900' : 'bg-slate-800 text-slate-400'}`}
                >
                  {c}
                </button>
              ))}
            </div>
          </div>

          <button 
            onClick={submit} 
            className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all active:scale-[0.97] shadow-lg shadow-blue-900/20">
            Publish Now
          </button>
          
          {status.msg && (
            <p className={`text-center text-sm font-bold animate-bounce ${status.type === 'success' ? 'text-emerald-400' : 'text-rose-400'}`}>
              {status.msg}
            </p>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
